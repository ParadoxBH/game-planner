<div style="
    width: {{SIZE}}px; 
    height: {{SIZE}}px; 
    border-radius: 50%; 
    background: {{COLOR}}; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    overflow: hidden; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.2s ease;
    {{BORDER_STYLE}}
" class="{{CLASS_NAME}}">
    <img src="{{ICON_URL}}" style="
        width: 85%; 
        height: 85%; 
        object-fit: contain;
        {{IMAGE_STYLE}}
    " />
</div>
